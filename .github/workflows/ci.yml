name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install black>=23.0.0 ruff>=0.1.0

      - name: black
        run: black --check --line-length 100 src/ tests/

      - name: ruff
        run: ruff check src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run fortran validation tests (not slow)
        run: |
          pytest tests/fortran_validation/ -m "not slow" -q \
            --no-cov \
            --tb=short

      - name: Run unit tests
        run: |
          pytest tests/ -m "unit" -q \
            --no-cov \
            --ignore=tests/fortran_validation \
            --ignore=tests/integration \
            --tb=short
        continue-on-error: true  # unit test dirs may be empty placeholders

  coverage:
    name: Coverage (Python 3.11)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/fortran_validation/ -m "not slow" -q \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --ignore=CLM-ml_v1 \
            --ignore=clubb_ML \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
