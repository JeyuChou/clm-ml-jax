[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --strict-config --verbose -ra
# Coverage disabled to avoid warnings from unparseable files
# --cov=src --cov-report=term-missing:skip-covered --cov-report=html:htmlcov --cov-report=xml
filterwarnings = 
    error
    # Ignore specific external library warnings that we can't control
    ignore::DeprecationWarning:netCDF4
    ignore::DeprecationWarning:xarray
    ignore::DeprecationWarning:numpy
    # Allow FutureWarnings from JAX (these are informational about upcoming changes)
    ignore::FutureWarning:jax
markers = 
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests